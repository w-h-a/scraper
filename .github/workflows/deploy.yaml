name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  DOCKER_IMAGE_NAME: golang-job-scraper
  DOCKER_REPO_PATH: ${{ secrets.DOCKER_USERNAME }}/golang-job-scraper

jobs:
  semver_tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tagger.outputs.next }}
      is_released: ${{ steps.tagger.outputs.next != steps.tagger.outputs.current }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Calculate Semantic Version Bump
        id: tagger
        uses: ietf-tools/semver-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          noVersionBumpBehavior: current

      - name: Create GitHub Release
        if: ${{ steps.tagger.outputs.next != steps.tagger.outputs.current }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tagger.outputs.next }}
          generate_release_notes: true

  build_push:
    runs-on: ubuntu-latest
    needs: [semver_tag]
    if: needs.semver_tag.outputs.is_released == 'true'
    outputs:
      image_tag: ${{ needs.semver_tag.outputs.new_tag }}
      app_version: ${{ needs.semver_tag.outputs.new_tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        env:
          IMAGE_TAG: ${{ needs.semver_tag.outputs.new_tag }}
        run: |
          FULL_IMAGE_TAG=${{ env.DOCKER_REPO_PATH }}:${{ env.IMAGE_TAG }}
          docker build -t $FULL_IMAGE_TAG .
          docker push $FULL_IMAGE_TAG

  deploy:
    runs-on: ubuntu-latest
    needs: [semver_tag, build_push]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Set image and version in manifests
        env:
          IMAGE_TAG: ${{ needs.build_push.outputs.image_tag }}
          APP_VERSION: ${{ needs.build_push.outputs.app_version }}
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|${{ env.DOCKER_REPO_PATH }}:${IMAGE_TAG}|" deploy/k8s/deployment.yaml
          sed -i "s|VERSION_PLACEHOLDER|${APP_VERSION}|" deploy/k8s/deployment.yaml

      - name: Apply manifests
        run: kubectl apply -f deploy/k8s/

      - name: Verify rollout
        run: kubectl rollout status deployment/scraper -n scraper --timeout=120s
